name: Week 17 CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  week17:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest weeks/week-17/tests/test_week_17.py

      - name: Validate Docker Compose file
        run: docker compose -f weeks/week-17/docker-compose.yml config
