# В этом месте вам необходимо: опишите GraphQL схему

type Order{
    id:ID!
    customer:String!
    total:Float!
    status:String!
    priority:Int!}

type Query{
    orders:[Order!]!
    order(id:ID!):Order}

type Mutation{
    createOrder(
        customer:String!,
        total:Float!,
        status:String!,
        priority:Int!
    ):Order!}