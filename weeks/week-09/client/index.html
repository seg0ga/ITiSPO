<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>WebRTC items-s05</title>
    <style>
        body { font-family: monospace; max-width: 600px; margin: 50px auto; padding: 20px; }
        #messages { height: 300px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; margin: 10px 0; }
        .sent { color: blue; text-align: right; }
        .received { color: green; }
        input, button { padding: 8px; }
        input { width: 70%; }
        button { width: 25%; }
        .status { margin: 10px 0; padding: 5px; background: #eee; }
    </style>
</head>
<body>
    <h2>WebRTC items-svc</h2>
    <div class="status" id="status">Подключение...</div>
    <div id="messages"></div>
    <input type="text" id="msg" placeholder="Введите сообщение..." disabled>
    <button id="send" disabled>Отправить</button>

    <script>
        const config={iceServers:[{urls:'stun:stun.l.google.com:19302'}]};
        let pc=null,dc=null,ws=null;
        let isInitiator=Math.random()<0.5;
        const statusDiv=document.getElementById('status');
        const messagesDiv=document.getElementById('messages');
        const msgInput=document.getElementById('msg');
        const sendBtn=document.getElementById('send');

        function addMessage(text,type){
            const div=document.createElement('div');
            div.className=type;
            div.textContent=(type==='sent'?'Вы: ':'Собеседник: ')+text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop=messagesDiv.scrollHeight;}

        ws=new WebSocket('ws://localhost:8181');
        ws.onopen=()=>{
            statusDiv.textContent='Signaling подключен, настройка P2P...';
            pc=new RTCPeerConnection(config);

            pc.onicecandidate=e=>{if (e.candidate) ws.send(JSON.stringify({type:'ice',candidate:e.candidate }));};
            if (isInitiator){
                dc=pc.createDataChannel('chat');
                dc.onopen=()=>{
                    statusDiv.textContent='P2P подключено!';
                    msgInput.disabled=false;
                    sendBtn.disabled=false;};
                dc.onmessage=e=>addMessage(e.data,'received');

                pc.createOffer().then(offer=>pc.setLocalDescription(offer))
                  .then(()=>ws.send(JSON.stringify({type:'offer',sdp:pc.localDescription })));
            }else{
                pc.ondatachannel=e =>{
                    dc=e.channel;
                    dc.onopen=()=>{
                        statusDiv.textContent='P2P подключено!';
                        msgInput.disabled=false;
                        sendBtn.disabled=false;};
                    dc.onmessage=e=>addMessage(e.data,'received');};}};

        ws.onmessage=async e=>{
            const data=JSON.parse(e.data);
            if (data.type==='offer'){
                await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                const answer=await pc.createAnswer();
                await pc.setLocalDescription(answer);
                ws.send(JSON.stringify({type:'answer',sdp:pc.localDescription}));
            }else if (data.type==='answer'){await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
            }else if (data.type==='ice'&&pc){await pc.addIceCandidate(new RTCIceCandidate(data.candidate));}};

        sendBtn.onclick=()=>{
            if (dc && dc.readyState==='open'){
                dc.send(msgInput.value);
                addMessage(msgInput.value,'sent');
                msgInput.value = '';}};

        msgInput.onkeypress=e=>{if(e.key==='Enter') sendBtn.click();};
    </script>
</body>
</html>
