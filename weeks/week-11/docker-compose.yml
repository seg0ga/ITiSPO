version: '3.9'

services:
  reviews-svc-s05:
    build: ./app
    ports:
      - "8149:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - app-network

  gateway:
    build: ./gateway
    ports:
      - "8080:80"
    depends_on:
      - reviews-svc-s05
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
